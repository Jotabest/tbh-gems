<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBH Gems & Engravings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Press+Start+2P&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  
  :root{
    --bg-dark: #1a1a1a;
    --bg-cell: #2d2d2d;
    --bg-cell-mid: #3a3a3a;
    --border-light: #6b6b6b;
    --border-dark: #0e0e0e;
    --border-cell: #4a4a4a;
    --gold: #c89647;
    --gold-bright: #ffce6b;
    --red-game: #a83232;
    --text: #f5e8c8;
    --text-dim: #b8b0a0;
    --text-muted: #8b8480;
  }
  
  body{
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-dark);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 80% at 20% 20%, #2d2d2d 0%, #1a1a1a 70%),
      radial-gradient(ellipse 80% 60% at 80% 80%, #3a3a3a 0%, transparent 50%);
    z-index: -2;
  }
  
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 100% 70% at 30% 0%, rgba(168, 50, 50, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 100% 70% at 70% 100%, rgba(200, 150, 71, 0.06) 0%, transparent 60%);
    z-index: -1;
    pointer-events: none;
    animation: tintShift 30s ease-in-out infinite alternate;
  }
  
  @keyframes tintShift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-15px, 10px); }
  }
  
  /* ========== HEADER ========== */
  header {
    padding: 30px 20px 16px;
    text-align: center;
    animation: fadeInDown 0.6s ease-out;
  }
  
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .header-wrap {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 24px;
    color: var(--gold-bright);
    letter-spacing: 1px;
    line-height: 1.3;
    text-shadow: 
      2px 2px 0 rgba(0, 0, 0, 0.8),
      0 0 20px rgba(200, 150, 71, 0.3);
  }
  
  .subtitle {
    color: var(--text-dim);
    font-size: 14px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    max-width: 600px;
  }
  
  /* ========== LANG TOGGLE ========== */
  .lang-toggle {
    display: flex;
    gap: 4px;
    background: rgba(30, 30, 30, 0.7);
    padding: 4px;
    backdrop-filter: blur(8px);
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.25),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.6);
  }
  
  .lang-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 7px 13px;
    background: transparent;
    color: var(--text-muted);
    border: none;
    cursor: pointer;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  
  .lang-btn:hover { color: var(--text); }
  
  .lang-btn.active {
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    color: #1a1a1a;
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.4),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.4);
  }
  
  /* ========== MAIN ========== */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 8px 20px 60px;
  }
  
  /* ========== FILTERS ========== */
  .filters {
    background: rgba(30, 30, 30, 0.7);
    backdrop-filter: blur(12px);
    padding: 20px;
    margin-bottom: 22px;
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.25),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.7),
      0 6px 20px rgba(0, 0, 0, 0.5);
    position: relative;
    z-index: 40;
  }
  
  .filter-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  
  .filter-block { position: relative; z-index: 1; }
  .filter-block:has(.grade-dropdown) { z-index: 50; }
  
  .filter-label {
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  select {
    width: 100%;
    padding: 10px 30px 10px 12px;
    background: rgba(20, 20, 20, 0.75);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    border: none;
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.15),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.8);
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10' fill='none'%3e%3cpath d='M2 4L5 7L8 4' stroke='%23c89647' stroke-width='1.5' stroke-linecap='round'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 12px center;
  }
  
  select:hover {
    background-color: rgba(40, 40, 40, 0.8);
    box-shadow:
      inset 1px 1px 0 0 rgba(200, 150, 71, 0.3),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.8);
  }
  
  select:focus {
    outline: none;
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 206, 107, 0.5),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.8),
      0 0 0 2px rgba(200, 150, 71, 0.4);
  }
  
  /* ========== GRADE DROPDOWN ========== */
  .grade-dropdown { position: relative; }
  
  .grade-trigger {
    width: 100%;
    padding: 10px 30px 10px 12px;
    background: rgba(20, 20, 20, 0.75);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.15),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.8);
    position: relative;
  }
  
  .grade-trigger:hover {
    background: rgba(40, 40, 40, 0.8);
  }
  
  .grade-trigger.open {
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 206, 107, 0.5),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.8);
  }
  
  .grade-trigger-text {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  .grade-trigger-arrow { transition: transform 0.15s; color: var(--gold); }
  .grade-trigger.open .grade-trigger-arrow { transform: rotate(180deg); }
  
  .grade-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: rgba(20, 20, 20, 0.95);
    backdrop-filter: blur(12px);
    padding: 6px;
    z-index: 1000;
    max-height: 340px;
    overflow-y: auto;
    display: none;
    box-shadow:
      inset 1px 1px 0 0 rgba(200, 150, 71, 0.3),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.8),
      0 8px 24px rgba(0, 0, 0, 0.7);
  }
  
  .grade-menu.open { display: block; }
  
  .grade-actions {
    display: flex;
    gap: 4px;
    padding: 4px 4px 8px;
    border-bottom: 1px solid rgba(180, 180, 180, 0.15);
    margin-bottom: 4px;
  }
  
  .grade-action-btn {
    flex: 1;
    padding: 5px 8px;
    font-size: 11px;
    font-family: inherit;
    background: rgba(30, 30, 30, 0.8);
    color: var(--text-muted);
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.15),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.7);
    transition: all 0.15s;
  }
  
  .grade-action-btn:hover {
    background: rgba(50, 50, 50, 0.9);
    color: var(--text);
  }
  
  .grade-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 9px;
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  
  .grade-item:hover { background: rgba(60, 60, 60, 0.5); }
  
  .grade-checkbox {
    width: 16px;
    height: 16px;
    background: rgba(20, 20, 20, 0.8);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.2),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.6);
  }
  
  .grade-item.checked .grade-checkbox {
    background: var(--gold);
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 206, 107, 0.7),
      inset -1px -1px 0 0 rgba(100, 70, 0, 0.6);
  }
  
  .grade-checkbox-tick { opacity: 0; color: #1a1a1a; }
  .grade-item.checked .grade-checkbox-tick { opacity: 1; }
  
  .grade-dot {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.2),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.5);
  }
  
  .grade-name { flex: 1; font-size: 13px; color: var(--text); }
  
  /* ========== RESULTS HEADER ========== */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  
  .count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }
  
  .count strong { color: var(--gold-bright); font-weight: 700; }
  
  /* ========== GRID & CARDS ========== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  
  .card {
    position: relative;
    padding: 18px;
    background: rgba(30, 30, 30, 0.75);
    backdrop-filter: blur(10px) saturate(120%);
    -webkit-backdrop-filter: blur(10px) saturate(120%);
    box-shadow:
      inset 0 2px 0 0 rgba(180, 180, 180, 0.4),
      inset 2px 0 0 0 rgba(180, 180, 180, 0.4),
      inset 0 -2px 0 0 rgba(0, 0, 0, 0.7),
      inset -2px 0 0 0 rgba(0, 0, 0, 0.7),
      0 4px 16px rgba(0, 0, 0, 0.5);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    animation: cardIn 0.5s ease-out backwards;
    image-rendering: pixelated;
    z-index: 1;
  }
  
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.45;
    z-index: -1;
    background-size: 200% 200%;
    animation: gradMove 10s ease-in-out infinite;
    -webkit-mask-image:
      linear-gradient(rgba(0,0,0,0.95), rgba(0,0,0,0.95)),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='4'><rect width='2' height='2' fill='black'/><rect x='2' y='2' width='2' height='2' fill='black'/></svg>");
    image-rendering: pixelated;
    transition: opacity 0.4s;
  }
  
  @keyframes gradMove {
    0%, 100% { background-position: 0% 0%; }
    50% { background-position: 100% 100%; }
  }
  
  .card[data-grade="COMMON"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(120, 120, 120, 0.4), transparent 60%);
  }
  .card[data-grade="UNCOMMON"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(71,154,35,0.5), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(50,110,25,0.4), transparent 60%);
  }
  .card[data-grade="RARE"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(91,156,246,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(37,99,168,0.45), transparent 60%);
  }
  .card[data-grade="LEGENDARY"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(245,200,66,0.5), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(201,105,10,0.45), transparent 60%);
  }
  .card[data-grade="IMMORTAL"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(201,52,52,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(140,30,30,0.45), transparent 60%);
  }
  .card[data-grade="ARCANA"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(192,132,252,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(122,38,160,0.45), transparent 60%);
  }
  .card[data-grade="BEYOND"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(244,114,182,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(193,34,89,0.45), transparent 60%);
  }
  .card[data-grade="CELESTIAL"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(190,225,235,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(127,184,217,0.45), transparent 60%);
  }
  .card[data-grade="DIVINE"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(255,253,240,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(208,155,59,0.5), transparent 60%);
  }
  .card[data-grade="COSMIC"]::before {
    background: 
      radial-gradient(circle at 30% 20%, rgba(247,115,25,0.55), transparent 60%),
      radial-gradient(circle at 70% 80%, rgba(155,31,94,0.55), transparent 60%);
  }
  
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 50%;
    height: 100%;
    background: linear-gradient(90deg, transparent 0%, rgba(255, 206, 107, 0.12) 50%, transparent 100%);
    transition: left 0.6s;
    pointer-events: none;
  }
  
  .card:hover {
    transform: translateY(-4px);
    box-shadow:
      inset 0 2px 0 0 rgba(220, 220, 220, 0.5),
      inset 2px 0 0 0 rgba(220, 220, 220, 0.5),
      inset 0 -2px 0 0 rgba(0, 0, 0, 0.8),
      inset -2px 0 0 0 rgba(0, 0, 0, 0.8),
      0 20px 40px rgba(0, 0, 0, 0.7),
      0 0 30px rgba(200, 150, 71, 0.2);
  }
  
  .card:hover::after { left: 150%; }
  .card:hover::before { opacity: 0.7; }
  
  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
    position: relative;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(180, 180, 180, 0.15);
    box-shadow: 0 1px 0 0 rgba(0, 0, 0, 0.5);
  }
  
  .card-icon {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
    background: var(--bg-cell);
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.4),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5px;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s;
    image-rendering: pixelated;
  }
  
  .card:hover .card-icon { transform: rotate(-5deg) scale(1.05); }
  
  .card-icon img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    position: relative;
    z-index: 1;
  }
  
  .card-info { flex: 1; min-width: 0; }
  
  .card-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--gold-bright);
    line-height: 1.2;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
  }
  
  .card-type {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .type-dot {
    width: 8px;
    height: 8px;
    flex-shrink: 0;
    box-shadow: 0 0 6px currentColor;
    border-radius: 0;
  }
  .type-dot.decoration { background: #fbbf24; color: #fbbf24; }
  .type-dot.engraving { background: #7ec96f; color: #7ec96f; }
  
  .card-grade {
    font-size: 10px;
    padding: 4px 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    align-self: flex-start;
    border-radius: 0;
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.3),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.5);
  }
  
  .grade-COMMON { background: rgba(70, 70, 70, 0.9); color: #ddd; }
  .grade-UNCOMMON { background: rgba(71, 154, 35, 0.85); color: #fff; }
  .grade-RARE { background: rgba(37, 99, 168, 0.85); color: #fff; }
  .grade-LEGENDARY { background: rgba(201, 105, 10, 0.85); color: #fff; }
  .grade-IMMORTAL { background: rgba(201, 52, 52, 0.85); color: #fff; }
  .grade-ARCANA { background: rgba(122, 38, 160, 0.85); color: #fff; }
  .grade-BEYOND { background: rgba(193, 34, 89, 0.85); color: #fff; }
  .grade-CELESTIAL { background: linear-gradient(90deg, #d3eef6, #7fb8d9); color: #0a4d6e; }
  .grade-DIVINE { background: linear-gradient(90deg, #fffdf0, #d09b3b); color: #5c3d00; }
  .grade-COSMIC {
    background: linear-gradient(135deg, rgba(247,115,25,0.9), rgba(155,31,94,0.85));
    color: #fff;
    animation: cosmicPulse 3s ease-in-out infinite;
  }
  
  @keyframes cosmicPulse {
    0%, 100% { 
      box-shadow:
        inset 1px 1px 0 0 rgba(255, 255, 255, 0.3),
        inset -1px -1px 0 0 rgba(0, 0, 0, 0.5),
        0 0 8px rgba(247, 115, 25, 0.4); 
    }
    50% { 
      box-shadow:
        inset 1px 1px 0 0 rgba(255, 255, 255, 0.4),
        inset -1px -1px 0 0 rgba(0, 0, 0, 0.5),
        0 0 18px rgba(247, 115, 25, 0.7); 
    }
  }
  
  .dot-COMMON { background: #6b6b6b; }
  .dot-UNCOMMON { background: #479a23; }
  .dot-RARE { background: #2563a8; }
  .dot-LEGENDARY { background: #c9690a; }
  .dot-IMMORTAL { background: #c93434; }
  .dot-ARCANA { background: #7a26a0; }
  .dot-BEYOND { background: #c12259; }
  .dot-CELESTIAL { background: linear-gradient(135deg, #d3eef6, #7fb8d9); }
  .dot-DIVINE { background: linear-gradient(135deg, #fffdf0, #d09b3b); }
  .dot-COSMIC { background: linear-gradient(135deg, #f77319, #9b1f5e); }
  
  /* ========== EFFECTS ========== */
  .effects { display: flex; flex-direction: column; gap: 5px; }
  
  .effect {
    display: flex;
    gap: 12px;
    align-items: baseline;
    padding: 9px 12px;
    background: rgba(20, 20, 20, 0.55);
    border-radius: 0;
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.12),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.5);
    font-size: 13px;
    transition: all 0.2s;
  }
  
  .effect:hover { 
    background: rgba(0, 0, 0, 0.5); 
    box-shadow:
      inset 1px 1px 0 0 rgba(200, 150, 71, 0.3),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.6);
  }
  
  .effect-slot {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    width: 78px;
    flex-shrink: 0;
    font-weight: 700;
  }
  
  .effect-stat { 
    flex: 1; 
    color: var(--text); 
    font-weight: 500; 
  }
  
  .effect.matched {
    background: rgba(245, 200, 66, 0.15);
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 206, 107, 0.5),
      inset -1px -1px 0 0 rgba(100, 70, 0, 0.6),
      0 0 8px rgba(245, 200, 66, 0.15);
  }
  
  .effect.matched .effect-stat { color: var(--gold-bright); font-weight: 600; }
  .effect.matched .effect-slot { color: var(--gold); }
  
  /* ========== EMPTY STATE ========== */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 50px 20px;
    background: rgba(30, 30, 30, 0.7);
    backdrop-filter: blur(10px);
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.25),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  
  .sad-pixel {
    width: 72px;
    height: 72px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 1px;
    image-rendering: pixelated;
    margin-bottom: 6px;
  }
  .sad-pixel .px { background: transparent; }
  .sad-pixel .px.on {
    background: var(--gold);
    box-shadow: 0 0 4px rgba(245,200,66,0.6);
  }
  
  .empty-msg {
    font-size: 16px;
    color: var(--text);
    max-width: 400px;
    line-height: 1.4;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }
  
  .empty-suggestion {
    font-size: 13px;
    color: var(--text-muted);
  }
  
  .suggestion-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
  }
  
  .suggestion-btn {
    padding: 8px 16px;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    color: #1a1a1a;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.4),
      inset -1px -1px 0 0 rgba(100, 70, 0, 0.5);
    transition: all 0.15s;
  }
  
  .suggestion-btn:hover {
    transform: translateY(-1px);
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.5),
      inset -1px -1px 0 0 rgba(100, 70, 0, 0.5),
      0 4px 12px rgba(200, 150, 71, 0.3);
  }
  
  .suggestion-btn.secondary {
    background: rgba(50, 50, 50, 0.8);
    color: var(--text-dim);
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.2),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.6);
  }
  
  .suggestion-btn.secondary:hover {
    background: rgba(70, 70, 70, 0.9);
    color: var(--text);
  }
  
  /* ========== FILTERS FAB (botón flotante para volver a filtros) ========== */
  .filters-fab {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 100;
    padding: 12px 18px;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold) 100%);
    color: #1a1a1a;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.4),
      inset -1px -1px 0 0 rgba(100, 70, 0, 0.5),
      0 8px 24px rgba(0, 0, 0, 0.5),
      0 0 20px rgba(200, 150, 71, 0.3);
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(20px);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .filters-fab.visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
  
  .filters-fab:hover {
    transform: translateY(-2px);
    box-shadow:
      inset 1px 1px 0 0 rgba(255, 255, 255, 0.5),
      inset -1px -1px 0 0 rgba(100, 70, 0, 0.5),
      0 12px 28px rgba(0, 0, 0, 0.6),
      0 0 30px rgba(200, 150, 71, 0.5);
  }
  
  .filters-fab-icon {
    font-size: 16px;
  }
  
  /* ========== FOOTER ========== */
  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 40px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }
  
  /* ========== SCROLLBAR ========== */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb {
    background: var(--border-cell);
    box-shadow:
      inset 1px 1px 0 0 rgba(180, 180, 180, 0.2),
      inset -1px -1px 0 0 rgba(0, 0, 0, 0.5);
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold); }
  
  /* ========== RESPONSIVE ========== */
  @media(max-width: 600px) {
    header { padding: 20px 14px 12px; }

    main { padding: 6px 14px 80px; }

    .filter-row { grid-template-columns: 1fr; gap: 10px; }
    .grid { grid-template-columns: 1fr; }
    .filters-fab { bottom: 16px; right: 16px; padding: 10px 14px; font-size: 12px; }
  }
</style>
</head>

}

  pt:{WEAPON:"Arma",ARMOR:"Armadura",ACCESSORY:"Acessório"}
};

const STAT_FORMAT = {
  "Multistrike_FLAT": "counter", "ProjectileCount_FLAT": "counter",
  "BaseAttackCountReduction_FLAT": "counter", "AddAllSkillLevel_FLAT": "counter",
  "AttackDamage_FLAT": "flat", "Armor_FLAT": "flat", "MaxHp_FLAT": "flat",
  "HpRegenPerSec_FLAT": "div100", "AddHpPerHit_FLAT": "flat", "AddHpPerKill_FLAT": "flat",
  "AdditionalExp_FLAT": "flat", "SkillRangeExpansion_FLAT": "flat",
  "FireDamageAddition_FLAT": "flat", "ColdDamageAddition_FLAT": "flat",
  "LightningDamageAddition_FLAT": "flat", "PhysicalDamageAddition_FLAT": "flat",
  "ChaosDamageAddition_FLAT": "flat", "DamageAddition_FLAT": "flat",
  "FireResistance_FLAT": "pct_direct", "ColdResistance_FLAT": "pct_direct",
  "LightningResistance_FLAT": "pct_direct", "ChaosResistance_FLAT": "pct_direct",
  "AllElementalResistance_FLAT": "pct_direct", "MaxFireResistance_FLAT": "pct_direct",
  "MaxColdResistance_FLAT": "pct_direct", "MaxLightningResistance_FLAT": "pct_direct",
  "MaxChaosResistance_FLAT": "pct_direct", "MaxDodgeChance_FLAT": "pct_direct",
  "MaxBlockChance_FLAT": "pct_direct", "CriticalChance_FLAT": "pct_direct",
  "MovementSpeed_FLAT": "pct_direct",
  "FireDamagePercent_FLAT": "pct10", "ColdDamagePercent_FLAT": "pct10",
  "LightningDamagePercent_FLAT": "pct10", "PhysicalDamagePercent_FLAT": "pct10",
  "ChaosDamagePercent_FLAT": "pct10",
  "FireDamageReduction_FLAT": "pct10", "ColdDamageReduction_FLAT": "pct10",
  "LightningDamageReduction_FLAT": "pct10", "ChaosDamageReduction_FLAT": "pct10",
  "PhysicalDamageReduction_FLAT": "pct10", "CooldownReduction_FLAT": "pct10",
  "DodgeChance_FLAT": "pct10", "BlockChance_FLAT": "pct10",
  "DamageReduction_FLAT": "pct10", "DamageAbsorption_FLAT": "pct10",
  "HpLeech_FLAT": "pct10", "CriticalDamage_FLAT": "pct10",
  "IncreaseExpAmount_FLAT": "pct10",
};

function fmtValue(stat, vmin, vmax, mod) {
  const key = `${stat}_${mod}`;
  let rule = STAT_FORMAT[key];
  if (!rule && (mod === "ADDITIVE" || mod === "MULTIPLICATIVE")) rule = "pct10";
  if (!rule) rule = "flat";
  if (rule === "counter") return "+1";
  if (rule === "pct_direct") return vmin === vmax ? `+${vmin}%` : `+${vmin}~${vmax}%`;
  if (rule === "pct10") {
    const lo = vmin / 10, hi = vmax / 10;
    const loStr = lo % 1 === 0 ? String(lo) : lo.toFixed(1);
    const hiStr = hi % 1 === 0 ? String(hi) : hi.toFixed(1);
    return loStr === hiStr ? `+${loStr}%` : `+${loStr}~${hiStr}%`;
  }
  if (rule === "div100") {
    const lo = vmin / 100, hi = vmax / 100;
    const loStr = lo % 1 === 0 ? String(lo) : lo.toFixed(1);
    const hiStr = hi % 1 === 0 ? String(hi) : hi.toFixed(1);
    return loStr === hiStr ? `+${loStr}` : `+${loStr}~${hiStr}`;
  }
  return vmin === vmax ? `+${vmin}` : `+${vmin}~${vmax}`;
}

function statLabel(stat) {
  const s = DATA.stats[stat];
  if (!s) return stat;
  return s[lang] || s.en || stat;
}

function itemName(m) {
  if (lang === 'pt' && m.name_pt) return m.name_pt;
  if (lang === 'es' && m.name_es) return m.name_es;
  return m.name_en;
}

function buildLangToggle() {
  const toggle = document.getElementById('lang-toggle');
  toggle.innerHTML = ['en','es','pt'].map(l => 
    `<button class="lang-btn ${l===lang?'active':''}" data-lang="${l}" onclick="setLang('${l}')">${LANG_NAMES[l]}</button>`
  ).join('');
}

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  buildLangToggle();
  applyTexts();
  buildStatFilter();
  buildGradeMenu();
  updateGradeTrigger();
  render();
}

function applyTexts() {
  const t = UI[lang];
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('lbl-stat').textContent = t.lbl_stat;
  document.getElementById('lbl-slot').textContent = t.lbl_slot;
  document.getElementById('lbl-type').textContent = t.lbl_type;
  document.getElementById('lbl-grade').textContent = t.lbl_grade;
  document.getElementById('footer').textContent = t.footer;
  document.getElementById('grade-all').textContent = t.grades_all;
  document.getElementById('grade-none').textContent = t.grades_none;
  document.getElementById('fab-label').textContent = t.fab_label;
  document.getElementById('filters-fab').title = t.fab_label;
  const slotSel = document.getElementById('filter-slot');
  slotSel.options[0].textContent = t.any_slot;
  slotSel.options[1].textContent = t.slot_w;
  slotSel.options[2].textContent = t.slot_a;
  slotSel.options[3].textContent = t.slot_acc;
  const typeSel = document.getElementById('filter-type');
  typeSel.options[0].textContent = t.type_any;
  typeSel.options[1].textContent = t.type_d;
  typeSel.options[2].textContent = t.type_e;
}

function buildStatFilter() {
  const sel = document.getElementById('filter-stat');
  const prev = sel.value;
  const used = new Set();
  DATA.materials.forEach(m => Object.values(m.effects).forEach(effList => effList.forEach(e => used.add(e.stat))));
  const sorted = Array.from(used).sort((a,b)=>statLabel(a).localeCompare(statLabel(b)));
  sel.innerHTML = `<option value="ANY">${UI[lang].any_stat}</option>`;
  sorted.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = statLabel(s);
    sel.appendChild(opt);
  });
  if (prev) sel.value = prev;
}

const GRADE_NAMES = {
  en:{COMMON:"Common",UNCOMMON:"Uncommon",RARE:"Rare",LEGENDARY:"Legendary",IMMORTAL:"Immortal",ARCANA:"Arcana",BEYOND:"Beyond",CELESTIAL:"Celestial",DIVINE:"Divine",COSMIC:"Cosmic"},
  es:{COMMON:"Común",UNCOMMON:"Poco Común",RARE:"Raro",LEGENDARY:"Legendario",IMMORTAL:"Inmortal",ARCANA:"Arcana",BEYOND:"Más Allá",CELESTIAL:"Celestial",DIVINE:"Divino",COSMIC:"Cósmico"},
  pt:{COMMON:"Comum",UNCOMMON:"Incomum",RARE:"Raro",LEGENDARY:"Lendário",IMMORTAL:"Imortal",ARCANA:"Arcano",BEYOND:"Além",CELESTIAL:"Celestial",DIVINE:"Divino",COSMIC:"Cósmico"}
};

function gradeName(g) { return GRADE_NAMES[lang][g] || g; }

function buildGradeMenu() {
  const list = document.getElementById('grade-list');
  list.innerHTML = DATA.grades.map(g => 
    `<div class="grade-item ${selectedGrades.has(g)?'checked':''}" data-grade="${g}">
      <div class="grade-checkbox">
        <svg class="grade-checkbox-tick" width="10" height="10" viewBox="0 0 12 12" fill="none">
          <path d="M2.5 6L5 8.5L9.5 4" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="grade-dot dot-${g}"></div>
      <div class="grade-name">${gradeName(g)}</div>
    </div>`
  ).join('');
  list.querySelectorAll('.grade-item').forEach(el => {
    el.addEventListener('click', () => {
      const g = el.dataset.grade;
      if (selectedGrades.has(g)) selectedGrades.delete(g);
      else selectedGrades.add(g);
      el.classList.toggle('checked');
      updateGradeTrigger();
      render();
    });
  });
}

function updateGradeTrigger() {
  const text = document.getElementById('grade-trigger-text');
  const t = UI[lang];
  const n = selectedGrades.size;
  if (n === DATA.grades.length) text.textContent = t.grades_all_selected;
  else if (n === 0) text.textContent = t.grades_none_selected;
  else if (n === 1) text.textContent = gradeName(Array.from(selectedGrades)[0]);
  else text.textContent = `${n} ${t.grades_count}`;
}

function getSadFace() {
  const grid = [
    "00111100","01000010","10110110","10110110",
    "10000010","10011110","01000010","00111100",
  ];
  let cells = '';
  for (const row of grid) for (const c of row) cells += `<div class="px ${c==='1'?'on':''}"></div>`;
  return `<div class="sad-pixel">${cells}</div>`;
}

function changeSlot(slot) {
  document.getElementById('filter-slot').value = slot;
  render();
}

function resetFilters() {
  document.getElementById('filter-stat').value = 'ANY';
  document.getElementById('filter-slot').value = 'ANY';
  document.getElementById('filter-type').value = 'ANY';
  selectedGrades = new Set(DATA.grades);
  buildGradeMenu();
  updateGradeTrigger();
  render();
}

function render() {
  const fStat = document.getElementById('filter-stat').value;
  const fSlot = document.getElementById('filter-slot').value;
  const fType = document.getElementById('filter-type').value;
  
  const results = DATA.materials.filter(m => {
    if (fType !== 'ANY' && m.type !== fType) return false;
    if (!selectedGrades.has(m.grade)) return false;
    if (fStat !== 'ANY' || fSlot !== 'ANY') {
      const slots = fSlot === 'ANY' ? ['WEAPON','ARMOR','ACCESSORY'] : [fSlot];
      return slots.some(sl => {
        const effList = m.effects[sl];
        if (!effList || effList.length === 0) return false;
        if (fStat !== 'ANY') return effList.some(e => e.stat === fStat);
        return true;
      });
    }
    return true;
  });
  
  const grid = document.getElementById('results');
  const countEl = document.getElementById('count');
  const t = UI[lang];
  
  if (results.length === 0) {
    countEl.innerHTML = `<strong>${t.count_zero}</strong>`;
    let msg = t.empty_msg_general;
    let suggestion = t.empty_suggestion;
    let buttons = [];
    
    if (fStat !== 'ANY' && fSlot !== 'ANY') {
      const otherSlots = ['WEAPON','ARMOR','ACCESSORY'].filter(s => s !== fSlot);
      const otherSlotsWithStat = otherSlots.filter(s => 
        DATA.materials.some(m => m.effects[s] && m.effects[s].some(e => e.stat === fStat))
      );
      const inThisSlot = DATA.materials.some(m => m.effects[fSlot] && m.effects[fSlot].some(e => e.stat === fStat));
      
      if (!inThisSlot && otherSlotsWithStat.length > 0) {
        msg = t.empty_msg_no_slot.replace('{slot}', SLOT_LABELS[lang][fSlot].toLowerCase());
        suggestion = '';
        otherSlotsWithStat.forEach(s => {
          buttons.push({label: t.btn_try_in.replace('{slot}', SLOT_LABELS[lang][s]), action: `changeSlot('${s}')`, primary: true});
        });
        buttons.push({label: t.btn_remove_slot, action: `changeSlot('ANY')`, primary: false});
      } else {
        buttons.push({label: t.btn_reset, action: `resetFilters()`, primary: true});
      }
    } else {
      buttons.push({label: t.btn_reset, action: `resetFilters()`, primary: true});
    }
    
    const buttonsHtml = buttons.length > 0 ? 
      `<div class="suggestion-buttons">${buttons.map(b => 
        `<button class="suggestion-btn ${b.primary?'':'secondary'}" onclick="${b.action}">${b.label}</button>`
      ).join('')}</div>` : '';
    
    grid.innerHTML = `<div class="empty-state">
      ${getSadFace()}
      <div class="empty-msg">${msg}</div>
      ${suggestion ? `<div class="empty-suggestion">${suggestion}</div>` : ''}
      ${buttonsHtml}
    </div>`;
    return;
  }
  
  countEl.innerHTML = `<strong>${results.length}</strong>${t.count_n}`;
  
  grid.innerHTML = results.map(m => {
    const name = itemName(m);
    const typeLabel = {DECORATION:'Decoration',ENGRAVING:'Engraving'}[m.type];
    const icon = DATA.icons[m.id];
    const iconHtml = icon ? `<img src="data:image/png;base64,${icon}" alt="">` : '';
    
    const effectsHtml = ['WEAPON','ARMOR','ACCESSORY'].map(slot => {
      const effList = m.effects[slot];
      if (!effList || effList.length === 0) return '';
      return effList.map((e, idx) => {
        const matched = (fStat === 'ANY' || e.stat === fStat) && (fSlot === 'ANY' || fSlot === slot);
        const slotLabel = idx === 0 ? SLOT_LABELS[lang][slot] : '';
        return `<div class="effect ${matched && (fStat!=='ANY' || fSlot!=='ANY') ? 'matched' : ''}">
          <span class="effect-slot">${slotLabel}</span>
          <span class="effect-stat">${statLabel(e.stat)} ${fmtValue(e.stat, e.min, e.max, e.mod)}</span>
        </div>`;
      }).join('');
    }).join('');
    
    return `<div class="card" data-grade="${m.grade}">
      <div class="card-header">
        <div class="card-icon">${iconHtml}</div>
        <div class="card-info">
          <div class="card-name">${name}</div>
          <div class="card-type"><span class="type-dot ${m.type === 'ENGRAVING' ? 'engraving' : 'decoration'}"></span>${typeLabel}</div>
        </div>
        <span class="card-grade grade-${m.grade}">${gradeName(m.grade)}</span>
      </div>
      <div class="effects">${effectsHtml}</div>
    </div>`;
  }).join('');
}

// Grade dropdown toggle
const trigger = document.getElementById('grade-trigger');
const menu = document.getElementById('grade-menu');
trigger.addEventListener('click', (e) => {
  e.stopPropagation();
  trigger.classList.toggle('open');
  menu.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if (!menu.contains(e.target) && e.target !== trigger) {
    trigger.classList.remove('open');
    menu.classList.remove('open');
  }
});

document.getElementById('grade-all').addEventListener('click', (e) => {
  e.stopPropagation();
  selectedGrades = new Set(DATA.grades);
  buildGradeMenu();
  updateGradeTrigger();
  render();
});
document.getElementById('grade-none').addEventListener('click', (e) => {
  e.stopPropagation();
  selectedGrades = new Set();
  buildGradeMenu();
  updateGradeTrigger();
  render();
});

// FAB: aparecer cuando el panel de filtros queda fuera de pantalla, scroll suave al hacer click
const fab = document.getElementById('filters-fab');
const filtersPanel = document.getElementById('filters-panel');

function checkFabVisibility() {
  const rect = filtersPanel.getBoundingClientRect();
  // Se muestra cuando la parte inferior del panel de filtros queda por encima del viewport
  if (rect.bottom < 0) {
    fab.classList.add('visible');
  } else {
    fab.classList.remove('visible');
  }
}

window.addEventListener('scroll', checkFabVisibility, { passive: true });
fab.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// Init
document.documentElement.lang = lang;
buildLangToggle();
applyTexts();
buildStatFilter();
buildGradeMenu();
updateGradeTrigger();
document.querySelectorAll('select').forEach(s => s.addEventListener('change', render));
render();
checkFabVisibility();
</script>
</body>
</html>
